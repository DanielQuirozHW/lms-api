name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

# Force all actions to run on Node.js 24 runtime
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ----------------------------------------------------------------
  # Unit tests — no real database or Redis required.
  # All env vars are fake values that satisfy Zod validation only.
  # Real infrastructure secrets belong in a future integration-test job.
  # ----------------------------------------------------------------
  ci:
    name: Lint, Test & Build
    runs-on: ubuntu-latest

    env:
      NODE_ENV: test

      # Fake values — satisfy Zod's url() / min(1) rules without any
      # real service. Unit tests mock all infrastructure calls.
      DATABASE_URL: postgresql://test:test@localhost:5432/test_db
      REDIS_HOST: localhost
      REDIS_PORT: 6379

      # 32-char test-only secrets — never used in production.
      JWT_SECRET: ci-test-jwt-secret-key-for-ci-only!!
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_SECRET: ci-test-refresh-secret-key-for-ci!!
      JWT_REFRESH_EXPIRES_IN: 30d

      CORS_ORIGINS: http://localhost:3001
      THROTTLE_TTL: 60000
      THROTTLE_LIMIT: 100
      R2_BUCKET_NAME: lms-assets
      PORTAL_MODE: MARKETPLACE

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: pnpm audit --audit-level=high

      - name: Generate Prisma client
        run: pnpm prisma:generate

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
